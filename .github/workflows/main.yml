name: Deploy Frontend to AWS

on:
  push:
    branches: [ "main" ]

env:
  # Podmień na swoją nazwę obrazu dla frontendu
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/expensetracker-frontend 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          # Upewnij się, że ścieżka do Dockerfile frontendu jest poprawna
          file: ./Dockerfile 
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Pobieramy świeży obraz frontendu
            docker pull ${{ env.IMAGE_NAME }}:latest
            
            # 2. Ubijamy stary kontener frontendu
            docker stop frontend-app || true
            docker rm frontend-app || true
            
            # 3. Odpalamy nowy! Zwróć uwagę na port 80:80 i podpięcie do sieci
            docker run -d -p 80:80 --name frontend-app \
              --network expense-network \
              ${{ env.IMAGE_NAME }}:latest
